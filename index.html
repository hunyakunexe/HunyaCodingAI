<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HunyaCodingAI - マルチレイヤーAIコード生成システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-panel, .discussion-panel, .code-panel, .status-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        .input-panel {
            animation-delay: 0.1s;
        }

        .discussion-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            animation-delay: 0.2s;
        }

        .code-panel {
            animation-delay: 0.3s;
        }

        .status-panel {
            animation-delay: 0.4s;
        }

        h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .config-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .discussion-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            animation: slideInLeft 0.4s ease-out;
        }

        .discussion-item.gemini {
            border-left-color: #ea4335;
        }

        .discussion-item.openai {
            border-left-color: #10a37f;
        }

        .discussion-item.custom {
            border-left-color: #764ba2;
        }

        .discussion-item.summary {
            border-left-color: #f7b801;
            background: #fffbf0;
        }

        .ai-name {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .discussion-item.gemini .ai-name {
            color: #ea4335;
        }

        .discussion-item.openai .ai-name {
            color: #10a37f;
        }

        .discussion-item.custom .ai-name {
            color: #764ba2;
        }

        .discussion-item.summary .ai-name {
            color: #f7b801;
        }

        .discussion-content {
            color: #555;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .discussion-scroll {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .code-output code {
            color: #d4d4d4;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .status-indicator.pending {
            background: #ffc107;
            animation: pulse 1.5s infinite;
        }

        .status-indicator.success {
            background: #28a745;
        }

        .status-indicator.error {
            background: #dc3545;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .download-section {
            text-align: center;
            margin-top: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .download-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .discussion-panel {
                grid-column: 1;
                grid-row: auto;
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .cycle-counter {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 HunyaCodingAI</h1>
            <p>マルチレイヤーAIシステム - 完全クライアントサイド実装</p>
        </header>

        <div class="main-grid">
            <!-- 左パネル：入力 -->
            <div class="input-panel">
                <h2>📝 リクエスト入力</h2>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="form-group">
                    <label for="userRequest">プロジェクト説明</label>
                    <textarea id="userRequest" placeholder="例: Minecraftのスポーン位置管理プラグインを作りたい&#10;ユーザーがコマンドで好きな位置をセットできて、ログイン時に自動で移動する機能が欲しい"></textarea>
                </div>

                <div class="form-group">
                    <label for="language">プログラミング言語</label>
                    <select id="language">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="typescript">TypeScript</option>
                        <option value="csharp">C#</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>

                <div class="config-group">
                    <div class="form-group">
                        <label for="geminiKey">Gemini API Key</label>
                        <input type="password" id="geminiKey" placeholder="AIzaSy...">
                    </div>
                    <div class="form-group">
                        <label for="openaiKey">OpenAI API Key</label>
                        <input type="password" id="openaiKey" placeholder="sk-...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="framework">フレームワーク/ライブラリ</label>
                    <input type="text" id="framework" placeholder="例: Discord.py, Spring Boot, Bukkit">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="startGeneration()" id="startBtn">🚀 生成開始</button>
                    <button class="btn-secondary" onclick="resetForm()">🔄 リセット</button>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="cycleCount">0</div>
                        <div class="stat-label">サイクル</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="discussionCount">0</div>
                        <div class="stat-label">議論数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="testCount">0</div>
                        <div class="stat-label">テスト回数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="iterations">0/50</div>
                        <div class="stat-label">進行状況</div>
                    </div>
                </div>
            </div>

            <!-- 中央パネル：議論 -->
            <div class="discussion-panel">
                <h2>💬 マルチAI議論フェーズ</h2>
                <div class="cycle-counter">サイクル: <span id="cycleBadge">0</span> / 50</div>
                <div class="discussion-scroll" id="discussionContainer"></div>
            </div>
        </div>

        <!-- 下段パネル：コード生成 -->
        <div class="code-panel">
            <h2>💻 生成コード</h2>
            <div class="code-output" id="codeOutput">
                <code>コード生成結果がここに表示されます...</code>
            </div>
        </div>

        <!-- ステータスパネル -->
        <div class="status-panel">
            <h2>📊 システムステータス</h2>
            <div id="statusContainer"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="download-section">
                <button class="download-btn" onclick="downloadZip()" id="downloadBtn" disabled>
                    📦 コードをダウンロード (ZIP)
                </button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // グローバル状態管理
        // =============================================
        const AppState = {
            currentCycle: 0,
            maxCycles: 50,
            discussionItems: [],
            generatedCode: '',
            testResults: [],
            apiKeys: {
                gemini: '',
                openai: ''
            },
            isRunning: false,
            stats: {
                discussionCount: 0,
                testCount: 0,
                cycleCount: 0
            }
        };

        // =============================================
        // カスタムAIエンジン（オリジナルAI）
        // =============================================
        class CustomAIEngine {
            constructor() {
                this.knowledge = new Map();
                this.initializeKnowledge();
            }

            initializeKnowledge() {
                // Python プラグイン知識
                this.knowledge.set('python-discord', {
                    frameworks: ['discord.py', 'py-cord'],
                    patterns: ['Event handlers', 'Commands', 'Cogs'],
                    bestPractices: ['Use async/await', 'Error handling', 'Rate limiting']
                });

                // JavaScript 知識
                this.knowledge.set('javascript-discord', {
                    frameworks: ['discord.js', 'discordeno'],
                    patterns: ['Event emitters', 'Slash commands', 'Interactions'],
                    bestPractices: ['Promises', 'Error handling', 'Rate limiting']
                });

                // Java 知識
                this.knowledge.set('java-minecraft', {
                    frameworks: ['Bukkit', 'Spigot', 'Paper'],
                    patterns: ['Listeners', 'Commands', 'Events'],
                    bestPractices: ['Async loading', 'Configuration files', 'Logging']
                });

                // TypeScript 知識
                this.knowledge.set('typescript-general', {
                    patterns: ['Interfaces', 'Classes', 'Generics'],
                    bestPractices: ['Strict mode', 'Type safety', 'Error handling']
                });
            }

            analyze(userRequest, language, framework) {
                const key = `${language}-${framework ? framework.split(' ')[0].toLowerCase() : 'general'}`;
                const kbase = this.knowledge.get(key) || this.knowledge.get(`${language}-general`) || {};

                return {
                    suggestion: this.generateSuggestion(userRequest, language, framework),
                    architecture: this.suggestArchitecture(language, kbase),
                    riskAnalysis: this.analyzeRisks(userRequest),
                    improvements: this.suggestImprovements(language)
                };
            }

            generateSuggestion(request, language, framework) {
                return `[Custom AI Analysis] 
                    - Language: ${language}
                    - Framework: ${framework || 'Standard Library'}
                    - Request Understanding: ${this.extractKeyFeatures(request)}
                    - Recommended Pattern: ${this.recommendPattern(request)}`;
            }

            extractKeyFeatures(request) {
                const keywords = ['plugin', 'bot', 'command', 'api', 'database', 'auth', 'config'];
                const features = keywords.filter(k => request.toLowerCase().includes(k));
                return features.length > 0 ? features.join(', ') : 'Basic functionality';
            }

            recommendPattern(request) {
                if (request.toLowerCase().includes('command')) return 'Command Pattern';
                if (request.toLowerCase().includes('event')) return 'Observer Pattern';
                if (request.toLowerCase().includes('config')) return 'Strategy Pattern';
                return 'Factory Pattern';
            }

            suggestArchitecture(language, knowledge) {
                const base = `Architecture: ${language === 'java' ? 'Package-based' : 'Module-based'}`;
                if (knowledge.patterns) {
                    return `${base} with ${knowledge.patterns.join(', ')}`;
                }
                return base;
            }

            analyzeRisks(request) {
                const risks = [];
                if (request.length > 500) risks.push('Large scope - consider phased development');
                if (request.toLowerCase().includes('database')) risks.push('Data persistence required - ensure backup strategy');
                if (request.toLowerCase().includes('api')) risks.push('External API dependency - implement fallback');
                return risks.length > 0 ? risks.join('; ') : 'Low risk - straightforward implementation';
            }

            suggestImprovements(language) {
                const improvements = {
                    python: ['Add type hints', 'Implement logging', 'Add configuration files'],
                    javascript: ['Use async/await', 'Add input validation', 'Implement error handlers'],
                    java: ['Use dependency injection', 'Add unit tests', 'Implement logging framework'],
                    typescript: ['Enable strict mode', 'Add JSDoc comments', 'Implement error boundaries']
                };
                return improvements[language] || ['Add comments', 'Add error handling', 'Add configuration'];
            }
        }

        // =============================================
        // Gemini API統合
        // =============================================
        async function callGeminiAPI(prompt, apiKey) {
            if (!apiKey) return generateFallbackResponse('Gemini');
            
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }]
                            }]
                        })
                    }
                );

                if (response.ok) {
                    const data = await response.json();
                    return data.candidates[0]?.content?.parts[0]?.text || generateFallbackResponse('Gemini');
                } else {
                    return generateFallbackResponse('Gemini');
                }
            } catch (error) {
                return generateFallbackResponse('Gemini');
            }
        }

        // =============================================
        // OpenAI API統合
        // =============================================
        async function callOpenAIAPI(prompt, apiKey) {
            if (!apiKey) return generateFallbackResponse('OpenAI');
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    return data.choices[0]?.message?.content || generateFallbackResponse('OpenAI');
                } else {
                    return generateFallbackResponse('OpenAI');
                }
            } catch (error) {
                return generateFallbackResponse('OpenAI');
            }
        }

        // =============================================
        // フォールバック応答生成（デモ用）
        // =============================================
        function generateFallbackResponse(source) {
            const responses = {
                'Gemini': `[${source}] 最新のGoogle検索結果を参考に、ベストプラクティスに従った実装を提案します。
                    - 最新API仕様を確認: 公式ドキュメント参照
                    - セキュリティ考慮: 入力検証とレート制限の実装
                    - パフォーマンス最適化: キャッシング戦略の導入`,
                'OpenAI': `[${source}] 深い推論に基づいた設計案を提案します。
                    - アーキテクチャ: 5層レイヤー設計
                    - 拡張性: プラグインシステムの実装
                    - テスト戦略: ユニット・統合・E2Eテストの組み合わせ`,
                'Custom': `[${source}] オリジナルAIの分析:
                    - パターン認識: コマンドパターンの検出
                    - 知識ベース: フレームワーク固有の最適化
                    - 改善提案: 独自のベストプラクティス`
            };
            return responses[source] || responses['Custom'];
        }

        // =============================================
        // 議論フェーズ管理
        // =============================================
        class DiscussionPhase {
            constructor() {
                this.customAI = new CustomAIEngine();
            }

            async conductDiscussion(userRequest, language, framework, apiKeys) {
                const discussions = [];

                // カスタムAI分析
                const customAnalysis = this.customAI.analyze(userRequest, language, framework);
                discussions.push({
                    source: 'custom',
                    content: customAnalysis.suggestion,
                    timestamp: new Date().toLocaleTimeString()
                });
                addDiscussionItem('custom', 'オリジナルAI', customAnalysis.suggestion);

                // Gemini分析
                const geminiPrompt = `
                    ユーザーリクエスト: "${userRequest}"
                    言語: ${language}
                    フレームワーク: ${framework}
                    
                    最新のGoogle検索結果とAPIドキュメントを参考に、このプロジェクトの実装アドバイスを提供してください。
                `;
                const geminiResponse = await callGeminiAPI(geminiPrompt, apiKeys.gemini);
                discussions.push({
                    source: 'gemini',
                    content: geminiResponse,
                    timestamp: new Date().toLocaleTimeString()
                });
                addDiscussionItem('gemini', 'Gemini (検索・最新情報)', geminiResponse);

                // OpenAI分析
                const openaiPrompt = `
                    ユーザーリクエスト: "${userRequest}"
                    言語: ${language}
                    フレームワーク: ${framework}
                    
                    深い推論に基づいて、以下を提案してください:
                    1. システムアーキテクチャ
                    2. リスク分析
                    3. パフォーマンス最適化案
                `;
                const openaiResponse = await callOpenAIAPI(openaiPrompt, apiKeys.openai);
                discussions.push({
                    source: 'openai',
                    content: openaiResponse,
                    timestamp: new Date().toLocaleTimeString()
                });
                addDiscussionItem('openai', 'OpenAI (推論・設計)', openaiResponse);

                AppState.stats.discussionCount += 3;
                return discussions;
            }
        }

        // =============================================
        // 議論まとめAI
        // =============================================
        class DiscussionSummarizerAI {
            summarize(discussions, userRequest, language) {
                const summary = `
【最適解の統合】
────────────────────────────────
リクエスト分析: "${userRequest}"
使用言語: ${language}

【複数AIからの推奨事項の統合】
✓ セキュリティ: 全AIが推奨するベストプラクティスを採用
✓ パフォーマンス: Openaiの推論 + Geminiの最新情報を結合
✓ 実装方法: Custom AIの知識ベースを活用

【最終推奨事項】
1. アーキテクチャ設計をCAの提案に基づいて構築
2. OpenAIのリスク分析を実施
3. Geminiの最新APIドキュメントに準拠

【コーディング指示】
次フェーズではこれらの方針に従ってコード生成を行います。
────────────────────────────────
                `;
                addDiscussionItem('summary', '議論まとめAI（司会者）', summary);
                return summary;
            }
        }

        // =============================================
        // コーディング専用AI

            capitalize(str) {
                return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
            }
        }

        // =============================================
        // テストエンジン（仮想コンソール）
        // =============================================
        class TestEngine {
            async test(code, language) {
                // シミュレーション: テスト実行
                await this.sleep(1500);

                const syntaxValid = this.validateSyntax(code, language);
                const logicValid = this.validateLogic(code);

                return {
                    passed: syntaxValid && logicValid,
                    syntaxErrors: syntaxValid ? [] : [`Syntax error in ${language} code`],
                    logicErrors: logicValid ? [] : ['Logic validation failed'],
                    coverage: Math.floor(Math.random() * 40 + 60),
                    executionTime: Math.random() * 1000
                };
            }

            validateSyntax(code, language) {
                // 基本的な構文チェック
                const hasMain = code.includes('main') || code.includes('execute') || code.includes('constructor');
                const hasClass = code.includes('class') || code.includes('public') || code.includes('def');
                return hasMain && hasClass;
            }

            validateLogic(code) {
                // ロジック検証
                const hasErrorHandling = code.includes('try') || code.includes('catch') || code.includes('except');
                const hasLogging = code.includes('log') || code.includes('print') || code.includes('console');
                return hasErrorHandling && hasLogging;
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // =============================================
        // UI更新関数
        // =============================================
        function addDiscussionItem(type, source, content) {
            const container = document.getElementById('discussionContainer');
            const item = document.createElement('div');
            item.className = `discussion-item ${type}`;
            
            const truncated = content.length > 300 ? content.substring(0, 300) + '...' : content;
            item.innerHTML = `
                <div class="ai-name">🤖 ${source}</div>
                <div class="discussion-content">${truncated}</div>
            `;
            
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
            AppState.discussionItems.push({ type, source, content });
        }

        function updateStatus(message, status = 'pending') {
            const container = document.getElementById('statusContainer');
            const item = document.createElement('div');
            item.className = 'status-item';
            
            const statusClass = status === 'success' ? 'success' : status === 'error' ? 'error' : 'pending';
            item.innerHTML = `
                <div class="status-indicator ${statusClass}"></div>
                <div>${message}</div>
            `;
            
            container.appendChild(item);
        }

        function updateCode(code) {
            const output = document.getElementById('codeOutput');
            output.innerHTML = `<code>${escapeHtml(code)}</code>`;
        }

        function updateProgress(cycle) {
            const fill = document.getElementById('progressFill');
            const percent = (cycle / AppState.maxCycles) * 100;
            fill.style.width = percent + '%';
            
            document.getElementById('iterations').textContent = `${cycle}/${AppState.maxCycles}`;
            document.getElementById('cycleBadge').textContent = cycle;
        }

        function updateStats() {
            document.getElementById('cycleCount').textContent = AppState.stats.cycleCount;
            document.getElementById('discussionCount').textContent = AppState.stats.discussionCount;
            document.getElementById('testCount').textContent = AppState.stats.testCount;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // =============================================
        // メイン生成フロー
        // =============================================
        async function startGeneration() {
            const userRequest = document.getElementById('userRequest').value.trim();
            const language = document.getElementById('language').value;
            const framework = document.getElementById('framework').value;
            const geminiKey = document.getElementById('geminiKey').value;
            const openaiKey = document.getElementById('openaiKey').value;

            if (!userRequest) {
                showError('プロジェクト説明を入力してください');
                return;
            }

            // 初期化
            AppState.isRunning = true;
            AppState.currentCycle = 0;
            AppState.stats = { discussionCount: 0, testCount: 0, cycleCount: 0 };
            AppState.apiKeys = { gemini: geminiKey, openai: openaiKey };

            document.getElementById('discussionContainer').innerHTML = '';
            document.getElementById('statusContainer').innerHTML = '';
            document.getElementById('startBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;

            const discussionPhase = new DiscussionPhase();
            const summarizer = new DiscussionSummarizerAI();
            const codingAI = new CodingAI();
            const testEngine = new TestEngine();

            try {
                // メインループ：最大50サイクル
                while (AppState.currentCycle < AppState.maxCycles) {
                    AppState.currentCycle++;
                    AppState.stats.cycleCount = AppState.currentCycle;

                    updateStatus(`サイクル ${AppState.currentCycle}: 議論フェーズ開始...`, 'pending');
                    updateProgress(AppState.currentCycle);

                    // ステップ1: 議論フェーズ
                    const discussions = await discussionPhase.conductDiscussion(
                        userRequest,
                        language,
                        framework,
                        AppState.apiKeys
                    );

                    await sleep(1000);

                    // ステップ2: 議論まとめ
                    updateStatus(`サイクル ${AppState.currentCycle}: 議論をまとめ中...`, 'pending');
                    const summary = summarizer.summarize(discussions, userRequest, language);

                    await sleep(500);

                    // ステップ3: コード生成
                    updateStatus(`サイクル ${AppState.currentCycle}: コード生成中...`, 'pending');
                    const generatedCode = codingAI.generate(language, framework, summary, AppState.currentCycle);
                    AppState.generatedCode = generatedCode;
                    updateCode(generatedCode);

                    await sleep(1500);

                    // ステップ4: テスト実行
                    updateStatus(`サイクル ${AppState.currentCycle}: テスト実行中...`, 'pending');
                    const testResult = await testEngine.test(generatedCode, language);
                    AppState.stats.testCount++;

                    if (testResult.passed) {
                        updateStatus(`✅ サイクル ${AppState.currentCycle}: テスト成功 (カバレッジ: ${testResult.coverage}%)`, 'success');

                        // テスト成功時: 品質向上のための再議論
                        if (AppState.currentCycle < 5) { // 最初の数サイクルのみ続行
                            updateStatus(`サイクル ${AppState.currentCycle}: 品質向上のための再議論...`, 'pending');
                            await sleep(800);
                        } else {
                            // 十分に最適化されたら終了
                            break;
                        }
                    } else {
                        updateStatus(`❌ サイクル ${AppState.currentCycle}: テスト失敗`, 'error');
                        addDiscussionItem('summary', 'テスト結果フィードバック', 
                            `エラー: ${testResult.syntaxErrors.concat(testResult.logicErrors).join(', ')}\n修正を議論フェーズに戻します`);
                    }

                    await sleep(500);
                }

                // 完成
                updateStatus('✨ コード生成完了！品質最適化サイクル終了', 'success');
                updateStats();
                document.getElementById('downloadBtn').disabled = false;

                showSuccess('コード生成が完了しました！');
            } catch (error) {
                showError(`エラーが発生しました: ${error.message}`);
                updateStatus(`エラー: ${error.message}`, 'error');
            } finally {
                AppState.isRunning = false;
                document.getElementById('startBtn').disabled = false;
            }
        }

        // =============================================
        // ユーティリティ関数
        // =============================================
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        function resetForm() {
            document.getElementById('userRequest').value = '';
            document.getElementById('framework').value = '';
            document.getElementById('language').value = 'python';
            document.getElementById('discussionContainer').innerHTML = '';
            document.getElementById('statusContainer').innerHTML = '';
            document.getElementById('codeOutput').innerHTML = '<code>コード生成結果がここに表示されます...</code>';
            document.getElementById('progressFill').style.width = '0%';
            AppState.currentCycle = 0;
            updateStats();
        }

        // =============================================
        // ZIP生成とダウンロード
        // =============================================
        async function downloadZip() {
            if (!AppState.generatedCode) {
                showError('まずコード生成を実行してください');
                return;
            }

            // 簡易的なZIP生成（実際にはJSZipなどのライブラリが必要）
            const language = document.getElementById('language').value;
            const filename = `generated-code.${getFileExtension(language)}`;

            // Base64エンコード
            const encoded = btoa(AppState.generatedCode);

            // ファイル構造の説明
            const readme = `# Generated Code

このファイルは HunyaCodingAI により自動生成されました。

## システム情報
- 言語: ${language}
- フレームワーク: ${document.getElementById('framework').value || 'Standard'}
- 生成日時: ${new Date().toLocaleString('ja-JP')}
- 完成度: ${AppState.currentCycle}/50 サイクル

## 品質メトリクス
- 議論回数: ${AppState.stats.discussionCount}
- テスト実行: ${AppState.stats.testCount} 回
- 改善サイクル: ${AppState.stats.cycleCount} 回

## ファイル構成
- ${filename}: メインコード

## 使用方法
このコードをプロジェクトに統合し、必要に応じてカスタマイズしてください。

---
Generated by HunyaCodingAI
`;

            // CSVダウンロード（簡易版）
            const csvContent = `言語,${language}
フレームワーク,${document.getElementById('framework').value || 'Standard'}
生成日時,${new Date().toLocaleString('ja-JP')}
完成度,${AppState.currentCycle}/50
議論回数,${AppState.stats.discussionCount}
テスト回数,${AppState.stats.testCount}
改善サイクル,${AppState.stats.cycleCount}`;

            // テキストファイルのダウンロード
            downloadFile(AppState.generatedCode, filename, 'text/plain');
            await sleep(200);
            downloadFile(readme, 'README.md', 'text/markdown');
            await sleep(200);
            downloadFile(csvContent, 'metadata.csv', 'text/csv');

            showSuccess('ファイルのダウンロードが開始されました！');
        }

        function getFileExtension(language) {
            const extensions = {
                python: 'py',
                javascript: 'js',
                typescript: 'ts',
                java: 'java',
                csharp: 'cs',
                cpp: 'cpp'
            };
            return extensions[language] || 'txt';
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            console.log('HunyaCodingAI システムが起動しました');
        });
    </script>
