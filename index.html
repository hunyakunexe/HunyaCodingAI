<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HunyaCodingAI - マルチレイヤーAIコード生成システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-panel, .discussion-panel, .code-panel, .status-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        .input-panel {
            animation-delay: 0.1s;
        }

        .discussion-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            animation-delay: 0.2s;
        }

        .code-panel {
            animation-delay: 0.3s;
        }

        .status-panel {
            animation-delay: 0.4s;
        }

        h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .config-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .discussion-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            animation: slideInLeft 0.4s ease-out;
            font-size: 0.9em;
        }

        .discussion-item.gemini {
            border-left-color: #ea4335;
        }

        .discussion-item.openai {
            border-left-color: #10a37f;
        }

        .discussion-item.custom {
            border-left-color: #764ba2;
        }

        .discussion-item.summary {
            border-left-color: #f7b801;
            background: #fffbf0;
        }

        .ai-name {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        .discussion-item.gemini .ai-name {
            color: #ea4335;
        }

        .discussion-item.openai .ai-name {
            color: #10a37f;
        }

        .discussion-item.custom .ai-name {
            color: #764ba2;
        }

        .discussion-item.summary .ai-name {
            color: #f7b801;
        }

        .discussion-content {
            color: #555;
            font-size: 0.9em;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
        }

        .discussion-scroll {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .code-output code {
            color: #d4d4d4;
        }

        .status-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .status-indicator.pending {
            background: #ffc107;
            animation: pulse 1.5s infinite;
        }

        .status-indicator.success {
            background: #28a745;
        }

        .status-indicator.error {
            background: #dc3545;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .download-section {
            text-align: center;
            margin-top: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .download-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .discussion-panel {
                grid-column: 1;
                grid-row: auto;
            }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .cycle-counter {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .thinking-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #764ba2;
            margin-right: 5px;
            animation: thinkingPulse 0.6s infinite;
        }

        @keyframes thinkingPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 HunyaCodingAI</h1>
            <p>マルチレイヤーAIシステム - 完全クライアントサイド実装（オリジナルAI強化版）</p>
        </header>

        <div class="main-grid">
            <!-- 左パネル：入力 -->
            <div class="input-panel">
                <h2>📝 リクエスト入力</h2>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <div class="form-group">
                    <label for="userRequest">プロジェクト説明</label>
                    <textarea id="userRequest" placeholder="例: Minecraftのスポーン位置管理プラグインを作りたい&#10;ユーザーがコマンドで好きな位置をセットできて、ログイン時に自動で移動する機能が欲しい"></textarea>
                </div>

                <div class="form-group">
                    <label for="language">プログラミング言語</label>
                    <select id="language">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="java">Java</option>
                        <option value="typescript">TypeScript</option>
                        <option value="csharp">C#</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>

                <div class="config-group">
                    <div class="form-group">
                        <label for="geminiKey">Gemini API Key</label>
                        <input type="password" id="geminiKey" placeholder="AIzaSy...">
                    </div>
                    <div class="form-group">
                        <label for="openaiKey">OpenAI API Key</label>
                        <input type="password" id="openaiKey" placeholder="sk-...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="framework">フレームワーク/ライブラリ</label>
                    <input type="text" id="framework" placeholder="例: Discord.py, Spring Boot, Bukkit">
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="startGeneration()" id="startBtn">🚀 生成開始</button>
                    <button class="btn-secondary" onclick="resetForm()">🔄 リセット</button>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="cycleCount">0</div>
                        <div class="stat-label">サイクル</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="discussionCount">0</div>
                        <div class="stat-label">議論数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="testCount">0</div>
                        <div class="stat-label">テスト</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="iterations">0/50</div>
                        <div class="stat-label">進度</div>
                    </div>
                </div>
            </div>

            <!-- 中央パネル：議論 -->
            <div class="discussion-panel">
                <h2>💬 マルチAI議論</h2>
                <div class="cycle-counter">サイクル: <span id="cycleBadge">0</span> / 50</div>
                <div class="discussion-scroll" id="discussionContainer"></div>
            </div>
        </div>

        <!-- 下段パネル：コード生成 -->
        <div class="code-panel">
            <h2>💻 生成コード</h2>
            <div class="code-output" id="codeOutput">
                <code>コード生成結果がここに表示されます...</code>
            </div>
        </div>

        <!-- ステータスパネル -->
        <div class="status-panel">
            <h2>📊 システムステータス</h2>
            <div id="statusContainer"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="download-section">
                <button class="download-btn" onclick="downloadZip()" id="downloadBtn" disabled>
                    📦 コードをダウンロード (ZIP)
                </button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // グローバル状態管理
        // =============================================
        const AppState = {
            currentCycle: 0,
            maxCycles: 50,
            discussionItems: [],
            generatedCode: '',
            testResults: [],
            apiKeys: { gemini: '', openai: '' },
            isRunning: false,
            stats: { discussionCount: 0, testCount: 0, cycleCount: 0 },
            previousDiscussions: []
        };

        // =============================================
        // 高性能オリジナルAIエンジン（大幅強化版）
        // =============================================
        class AdvancedCustomAIEngine {
            constructor() {
                this.knowledgeBase = new Map();
                this.patternLibrary = new Map();
                this.architecturePatterns = new Map();
                this.bestPracticesDB = new Map();
                this.codeTemplateLibrary = new Map();
                this.riskAssessmentRules = new Map();
                this.performanceOptimizations = new Map();
                this.initializeComprehensiveKnowledge();
            }

            initializeComprehensiveKnowledge() {
                // ================== Python ==================
                this.knowledgeBase.set('python-discord', {
                    frameworks: ['discord.py', 'py-cord', 'discord-interactions'],
                    patterns: ['Cogs system', 'Event handlers', 'Commands', 'Tasks', 'Context managers'],
                    architectures: ['MVC', 'Layered', 'Plugin-based'],
                    libraries: ['asyncio', 'aiohttp', 'SQLAlchemy', 'pydantic'],
                    bestPractices: [
                        'Use async/await everywhere',
                        'Implement proper error handling with try-except-finally',
                        'Rate limiting per user',
                        'Connection pooling for databases',
                        'Dependency injection pattern',
                        'Configuration management with .env files'
                    ]
                });

                this.knowledgeBase.set('python-minecraft', {
                    frameworks: ['Bukkit', 'Spigot', 'Paper', 'PyMC'],
                    patterns: ['Plugin listeners', 'Event system', 'Command handlers', 'Configuration files'],
                    architectures: ['Plugin-based', 'Service-oriented'],
                    libraries: ['pyyaml', 'pymongo', 'redis'],
                    bestPractices: [
                        'Async task scheduling',
                        'Data persistence strategy',
                        'Plugin configuration in YAML',
                        'Proper logging with timestamps',
                        'Memory optimization for long-running tasks'
                    ]
                });

                this.knowledgeBase.set('python-general', {
                    frameworks: ['FastAPI', 'Flask', 'Django', 'Celery'],
                    patterns: ['Singleton', 'Factory', 'Observer', 'Strategy', 'Decorator'],
                    architectures: ['Microservices', 'Monolithic', 'Serverless'],
                    libraries: ['typing', 'dataclasses', 'logging', 'unittest', 'pytest'],
                    bestPractices: [
                        'Type hints for all functions',
                        'Docstrings with examples',
                        'Unit tests with >80% coverage',
                        'Virtual environments',
                        'CI/CD integration'
                    ]
                });

                // ================== JavaScript ==================
                this.knowledgeBase.set('javascript-discord', {
                    frameworks: ['discord.js', 'discordeno', 'eris'],
                    patterns: ['Event emitters', 'Middleware', 'Slash commands', 'Message components'],
                    architectures: ['Command handler', 'Client-server', 'Modular'],
                    libraries: ['node-fetch', 'axios', 'dotenv', 'better-sqlite3'],
                    bestPractices: [
                        'Use Promises and async/await',
                        'Implement comprehensive error handling',
                        'Cache frequently accessed data',
                        'Rate limiting with buckets',
                        'Proper shutdown handling'
                    ]
                });

                this.knowledgeBase.set('javascript-general', {
                    frameworks: ['Node.js', 'Express', 'Fastify', 'NestJS'],
                    patterns: ['Module pattern', 'Middleware', 'Observer', 'Proxy', 'Factory'],
                    architectures: ['Layered', 'Microservices', 'Event-driven'],
                    libraries: ['winston', 'joi', 'moment', 'lodash'],
                    bestPractices: [
                        'Const/let instead of var',
                        'Arrow functions for callbacks',
                        'Promise chains or async/await',
                        'Input validation',
                        'Comprehensive logging'
                    ]
                });

                // ================== Java ==================
                this.knowledgeBase.set('java-minecraft', {
                    frameworks: ['Bukkit', 'Spigot', 'Paper', 'Sponge'],
                    patterns: ['Listeners', 'Singletons', 'Builder', 'Factory'],
                    architectures: ['Plugin-based', 'Event-driven', 'MVC'],
                    libraries: ['Lombok', 'Gson', 'SQLite', 'Redis'],
                    bestPractices: [
                        'Async task scheduling',
                        'Configuration in plugin.yml',
                        'Proper resource management',
                        'Thread-safe operations',
                        'Memory efficient data structures'
                    ]
                });

                this.knowledgeBase.set('java-general', {
                    frameworks: ['Spring', 'Quarkus', 'Micronaut', 'Dropwizard'],
                    patterns: ['MVC', 'Repository', 'Service', 'DAO', 'Singleton'],
                    architectures: ['Layered', 'Microservices', 'Domain-driven design'],
                    libraries: ['JUnit', 'Mockito', 'Log4j', 'Jackson'],
                    bestPractices: [
                        'Dependency injection',
                        'SOLID principles',
                        'Exception handling hierarchy',
                        'Resource try-with-resources',
                        'Unit testing with mocks'
                    ]
                });

                // ================== TypeScript ==================
                this.knowledgeBase.set('typescript-general', {
                    frameworks: ['NestJS', 'TypeORM', 'Express'],
                    patterns: ['Decorators', 'Interfaces', 'Generics', 'Mixins'],
                    architectures: ['Layered', 'DDD', 'Modular'],
                    libraries: ['class-validator', 'class-transformer', 'winston'],
                    bestPractices: [
                        'Strict mode enabled',
                        'Strong typing throughout',
                        'Interface segregation',
                        'Module exports',
                        'Generics for reusability'
                    ]
                });

                // ================== C# ==================
                this.knowledgeBase.set('csharp-general', {
                    frameworks: ['.NET', '.NET Core', 'ASP.NET Core', 'Unity'],
                    patterns: ['LINQ', 'Delegates', 'Events', 'Generics'],
                    architectures: ['MVC', 'MVVM', 'Microservices'],
                    libraries: ['Entity Framework', 'Serilog', 'Autofac'],
                    bestPractices: [
                        'Using statements for resource management',
                        'Properties instead of fields',
                        'Async/await patterns',
                        'Dependency injection containers',
                        'Unit tests with xUnit'
                    ]
                });

                // ================== C++ ==================
                this.knowledgeBase.set('cpp-general', {
                    frameworks: ['Boost', 'Qt', 'wxWidgets', 'SFML'],
                    patterns: ['RAII', 'Smart pointers', 'Template metaprogramming'],
                    architectures: ['Observer', 'Strategy', 'Factory'],
                    libraries: ['STL', 'nlohmann/json', 'spdlog'],
                    bestPractices: [
                        'Use const correctness',
                        'Prefer stack allocation',
                        'Smart pointers over raw pointers',
                        'Move semantics',
                        'Template specialization'
                    ]
                });

                // ================== アーキテクチャパターン ==================
                this.architecturePatterns.set('plugin-system', {
                    description: 'プラグインベースの拡張可能なアーキテクチャ',
                    layers: ['Core Engine', 'Plugin Interface', 'Plugin Implementations', 'Plugin Registry'],
                    benefits: ['Extensibility', 'Maintainability', 'Modularity'],
                    tradeoffs: ['Complexity', 'Performance overhead']
                });

                this.architecturePatterns.set('event-driven', {
                    description: 'イベント駆動型アーキテクチャ',
                    layers: ['Event Producer', 'Event Bus', 'Event Handler', 'State Store'],
                    benefits: ['Scalability', 'Decoupling', 'Responsiveness'],
                    tradeoffs: ['Complexity', 'Testing difficulty']
                });

                this.architecturePatterns.set('microservices', {
                    description: 'マイクロサービスアーキテクチャ',
                    layers: ['API Gateway', 'Services', 'Data Stores', 'Message Bus'],
                    benefits: ['Independent deployment', 'Technology diversity', 'Scalability'],
                    tradeoffs: ['Network latency', 'Data consistency', 'Debugging']
                });

                this.architecturePatterns.set('layered', {
                    description: '層状アーキテクチャ',
                    layers: ['Presentation', 'Business Logic', 'Persistence', 'Database'],
                    benefits: ['Clear separation of concerns', 'Testability', 'Maintainability'],
                    tradeoffs: ['Performance', 'Rigidity']
                });

                // ================== リスク評価ルール ==================
                this.riskAssessmentRules.set('scope-complexity', {
                    check: (req) => req.length > 800,
                    risk: 'HIGH',
                    message: '大規模プロジェクト: フェーズ開発とインクリメンタルテストが必須',
                    mitigation: ['段階的実装', '早期プロトタイピング', '継続的テスト']
                });

                this.riskAssessmentRules.set('database', {
                    check: (req) => /database|storage|persist|data/i.test(req),
                    risk: 'MEDIUM',
                    message: 'データベース統合あり: バックアップ戦略とスキーマ管理が重要',
                    mitigation: ['マイグレーション計画', 'トランザクション管理', 'バックアップ体制']
                });

                this.riskAssessmentRules.set('external-api', {
                    check: (req) => /api|external|third-party|cloud/i.test(req),
                    risk: 'MEDIUM',
                    message: '外部API依存: フォールバック機構とリトライロジックが必須',
                    mitigation: ['リトライ機構', 'キャッシング', 'フェイルオーバー']
                });

                this.riskAssessmentRules.set('authentication', {
                    check: (req) => /auth|security|token|password/i.test(req),
                    risk: 'HIGH',
                    message: 'セキュリティ考慮必須: 認証・暗号化・入力検証の徹底',
                    mitigation: ['HashPassword', 'JWTトークン', '入力検証', 'HTTPS']
                });

                this.riskAssessmentRules.set('performance', {
                    check: (req) => /fast|optimize|performance|scale/i.test(req),
                    risk: 'MEDIUM',
                    message: 'パフォーマンス要件: プロファイリングとベンチマーク必須',
                    mitigation: ['キャッシング', 'インデックス', '非同期処理', 'CDN']
                });

                // ================== パフォーマンス最適化 ==================
                this.performanceOptimizations.set('caching', {
                    technique: 'メモリキャッシング',
                    tools: ['Redis', 'Memcached', 'local caching'],
                    implementation: 'LRU or TTL based cache invalidation'
                });

                this.performanceOptimizations.set('async', {
                    technique: '非同期処理',

                    { pattern: /api|integration|external|webhook/i, type: 'Integration' },
                    { pattern: /log|monitor|track|debug/i, type: 'Logging' }

                    if (pattern.test(request)) {

        async function callGeminiAPI(prompt, apiKey) {
            if (!apiKey) return generateFallbackResponse('Gemini');
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    }
                );
                if (response.ok) {
                    const data = await response.json();
                    return data.candidates[0]?.content?.parts[0]?.text || generateFallbackResponse('Gemini');
                }
            } catch (error) {
                console.log('Gemini API error (using fallback)');
            }
            return generateFallbackResponse('Gemini');
        }

        async function callOpenAIAPI(prompt, apiKey) {
            if (!apiKey) return generateFallbackResponse('OpenAI');
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });
                if (response.ok) {
                    const data = await response.json();
                    return data.choices[0]?.message?.content || generateFallbackResponse('OpenAI');
                }
            } catch (error) {
                console.log('OpenAI API error (using fallback)');
            }
            return generateFallbackResponse('OpenAI');
        }

            container.scrollTop = container.scrollHeight;
        }

        function updateStatus(message, status = 'pending') {
            const container = document.getElementById('statusContainer');
            const item = document.createElement('div');
            item.className = 'status-item';
            const statusClass = status === 'success' ? 'success' : status === 'error' ? 'error' : 'pending';
            item.innerHTML = `
                <div class="status-indicator ${statusClass}"></div>
                <div>${message}</div>
            `;
            container.appendChild(item);
        }

        function updateCode(code) {
            document.getElementById('codeOutput').innerHTML = `<code>${escapeHtml(code)}</code>`;
        }

        function updateProgress(cycle) {
            const percent = (cycle / 50) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('iterations').textContent = `${cycle}/50`;
            document.getElementById('cycleBadge').textContent = cycle;
        }

        function updateStats() {
            document.getElementById('cycleCount').textContent = AppState.stats.cycleCount;
            document.getElementById('discussionCount').textContent = AppState.stats.discussionCount;
            document.getElementById('testCount').textContent = AppState.stats.testCount;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        function showError(msg) {
            const div = document.getElementById('errorMessage');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            const div = document.getElementById('successMessage');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 5000);
        }

        // =============================================
        // メインフロー
        // =============================================
        async function startGeneration() {
            const userRequest = document.getElementById('userRequest').value.trim();
            const language = document.getElementById('language').value;
            const framework = document.getElementById('framework').value;
            const geminiKey = document.getElementById('geminiKey').value;
            const openaiKey = document.getElementById('openaiKey').value;

            if (!userRequest) {
                showError('プロジェクト説明を入力してください');
                return;
            }

            AppState.isRunning = true;
            AppState.currentCycle = 0;
            AppState.stats = { discussionCount: 0, testCount: 0, cycleCount: 0 };
            AppState.apiKeys = { gemini: geminiKey, openai: openaiKey };
            document.getElementById('discussionContainer').innerHTML = '';
            document.getElementById('statusContainer').innerHTML = '';
            document.getElementById('startBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;

            const discussionPhase = new DiscussionPhase();
            const summarizer = new DiscussionSummarizerAI();
            const codingAI = new CodingAI();
            const testEngine = new TestEngine();

            try {
                while (AppState.currentCycle < 5) { // Demo: 5 cycles
                    AppState.currentCycle++;
                    AppState.stats.cycleCount = AppState.currentCycle;
                    updateStatus(`Cycle ${AppState.currentCycle}: Discussion...`);
                    updateProgress(AppState.currentCycle);

                    const discussions = await discussionPhase.conductDiscussion(
                        userRequest, language, framework, AppState.apiKeys, AppState.previousDiscussions
                    );
                    AppState.previousDiscussions = discussions;

                    await sleep(800);

                    updateStatus(`Cycle ${AppState.currentCycle}: Summarizing...`);
                    const summary = summarizer.summarize(discussions, userRequest, language);

                    await sleep(500);

                    updateStatus(`Cycle ${AppState.currentCycle}: Generating code...`);
                    const code = codingAI.generate(language, framework, summary, AppState.currentCycle);
                    AppState.generatedCode = code;
                    updateCode(code);

                    await sleep(1000);

                    updateStatus(`Cycle ${AppState.currentCycle}: Testing...`);
                    const testResult = await testEngine.test(code, language);
                    AppState.stats.testCount++;

                    if (testResult.passed) {
                        updateStatus(`✅ Cycle ${AppState.currentCycle}: Test passed (${testResult.coverage}% coverage)`, 'success');
                    } else {
                        updateStatus(`❌ Cycle ${AppState.currentCycle}: Test failed`, 'error');
                    }

                    await sleep(500);
                }

                updateStatus('✨ Generation complete!', 'success');
                updateStats();
                document.getElementById('downloadBtn').disabled = false;
                showSuccess('Code generation completed!');
            } catch (error) {
                showError(`Error: ${error.message}`);
                updateStatus(`Error: ${error.message}`, 'error');
            } finally {
                AppState.isRunning = false;
                document.getElementById('startBtn').disabled = false;
            }
        }

        function resetForm() {
            document.getElementById('userRequest').value = '';
            document.getElementById('framework').value = '';
            document.getElementById('language').value = 'python';
            document.getElementById('discussionContainer').innerHTML = '';
            document.getElementById('statusContainer').innerHTML = '';
            document.getElementById('codeOutput').innerHTML = '<code>Code output...</code>';
            document.getElementById('progressFill').style.width = '0%';
            AppState.currentCycle = 0;
            updateStats();
        }

        async function downloadZip() {
            if (!AppState.generatedCode) {
                showError('Generate code first');
                return;
            }

            const language = document.getElementById('language').value;
            const filename = `generated.${getExtension(language)}`;
            const readme = `# Generated Code\n\nLanguage: ${language}\nFramework: ${document.getElementById('framework').value}\nGenerated: ${new Date().toLocaleString()}`;
            const metadata = `Language,${language}\nFramework,${document.getElementById('framework').value}\nCycles,${AppState.stats.cycleCount}\nTests,${AppState.stats.testCount}`;

            downloadFile(AppState.generatedCode, filename, 'text/plain');
            await sleep(200);
            downloadFile(readme, 'README.md', 'text/markdown');
            await sleep(200);
            downloadFile(metadata, 'metadata.csv', 'text/csv');

            showSuccess('Download started!');
        }

        function getExtension(lang) {
            const ext = { python: 'py', javascript: 'js', java: 'java', typescript: 'ts', csharp: 'cs', cpp: 'cpp' };
            return ext[lang] || 'txt';
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            console.log('🚀 HunyaCodingAI Advanced System Ready');
        });
    </script>
</body>
</html>
